const ScrollColorCtx = createContext({ fg: "#353535", label: "#275D43", isDark: false });

function useReveal(threshold = 0.15) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setVisible(true); obs.disconnect(); } },
      { threshold }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, [threshold]);
  return [ref, visible];
}

// ═══════════════════════════════════════════════════════
function ProgressBar() {
  const [pct, setPct] = useState(0);
  useEffect(() => {
    const onScroll = () => {
      const el = document.documentElement;
      setPct(el.scrollTop / (el.scrollHeight - el.clientHeight) * 100);
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  return (
    <div style={{
      position: "fixed", top: 0, left: 0, width: `${pct}%`, height: 3,
      background: `linear-gradient(90deg, ${B.primary}, ${B.accent})`,
      zIndex: 2000, transition: "width 0.1s linear",
    }} />
  );
}

function Reveal({ children, delay = 0, direction = "up" }) {
  const [ref, visible] = useReveal();
  const transforms = {
    up: visible ? "none" : "translateY(28px)",
    down: visible ? "none" : "translateY(-28px)",
    none: "none",
  };
  return (
    <div ref={ref} style={{
      opacity: visible ? 1 : 0,
      transform: transforms[direction] || transforms.up,
      transition: `opacity 0.7s ease ${delay}s, transform 0.7s ease ${delay}s`,
    }}>
      {children}
    </div>
  );
}

// Simple inline bar chart for the "Where Time Goes" visualization
// Animated counting number
function CountUp({ target, visible, delay = 0 }) {
  const [count, setCount] = useState(0);
  useEffect(() => {
    if (!visible) return;
    let start = null;
    const duration = 1000;
    const animate = (ts) => {
      if (!start) start = ts;
      const progress = Math.min((ts - start) / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      setCount(Math.round(eased * target));
      if (progress < 1) requestAnimationFrame(animate);
    };
    const t = setTimeout(() => requestAnimationFrame(animate), delay);
    return () => clearTimeout(t);
  }, [visible, target, delay]);
  return <>{count}</>;
}

// Zoomable / lightbox image
function ZoomableImg({ src, alt, style = {} }) {
  const [open, setOpen] = useState(false);
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === "Escape") setOpen(false); };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, [open]);
  return (
    <>
      <img src={src} alt={alt} style={{ ...style, cursor: "zoom-in" }} onClick={() => setOpen(true)} />
      {open && (
        <div onClick={() => setOpen(false)} style={{
          position: "fixed", inset: 0, zIndex: 2000, background: "rgba(0,0,0,0.92)",
          display: "flex", alignItems: "center", justifyContent: "center",
          cursor: "zoom-out", animation: "lbIn 0.3s ease forwards",
        }}>
          <img src={src} alt={alt} style={{ maxWidth: "94vw", maxHeight: "94vh", objectFit: "contain", borderRadius: 4, animation: "lbScale 0.3s ease forwards" }} />
        </div>
      )}
    </>
  );
}

// Animated donut/pie chart with counting number
function PieChart({ pct, color, size = 120, trackColor = "rgba(255,255,255,0.12)" }) {
  const [ref, visible] = useReveal(0.3);
  const [count, setCount] = useState(0);
  const r = (size - 12) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;

  useEffect(() => {
    if (!visible) return;
    let start = null;
    const duration = 1200;
    const animate = (ts) => {
      if (!start) start = ts;
      const progress = Math.min((ts - start) / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
      setCount(Math.round(eased * pct));
      if (progress < 1) requestAnimationFrame(animate);
    };
    const delay = setTimeout(() => requestAnimationFrame(animate), 300);
    return () => clearTimeout(delay);
  }, [visible, pct]);

  return (
    <div ref={ref} style={{ position: "relative", width: size, height: size, margin: "0 auto 12px" }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={trackColor} strokeWidth="10" />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="10"
          strokeLinecap="round"
          strokeDasharray={circ}
          strokeDashoffset={visible ? offset : circ}
          style={{ transition: `stroke-dashoffset 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.3s` }}
        />
      </svg>
      <div style={{
        position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center",
        fontFamily: FONTS.serif, fontSize: Math.round(size * 0.27), fontWeight: 700, color: color, lineHeight: 1,
      }}>{count}%</div>
    </div>
  );
}

// Hook for scroll-driven dark-to-light background transition
function useScrollProgress() {
  const [progress, setProgress] = useState(0);
  useEffect(() => {
    const onScroll = () => {
      const el = document.documentElement;
      const pct = el.scrollTop / (el.scrollHeight - el.clientHeight);
      setProgress(Math.min(1, Math.max(0, pct)));
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  return progress;
}

// Interpolate between two hex colors
function lerpColor(a, b, t) {
  const p = (s, i) => parseInt(s.slice(i, i + 2), 16);
  const r = Math.round(p(a, 1) + (p(b, 1) - p(a, 1)) * t);
  const g = Math.round(p(a, 3) + (p(b, 3) - p(a, 3)) * t);
  const bl = Math.round(p(a, 5) + (p(b, 5) - p(a, 5)) * t);
  return `rgb(${r},${g},${bl})`;
}

            <section style={{ paddingBottom: 64 }}>
              <Chapter label="The System Today" id="sec-frustrated" />

              <H2>Everyone is Frustrated</H2>

              <DropCap>Imagine a school that never told you how your child was doing. Instead, every update focused on the school itself — how many classes it delivered, how many students attended, how well it met its internal targets. Occasionally, you might receive a testimonial from a student about how much they enjoyed a class. Encouraging, but not what you asked for. You don't see if your child is keeping up, if they're falling behind, or how students like them typically progress. And if your child had to move schools, they would have to be assessed from scratch — no shared records, no continuity, no understanding of their needs for the next set of teachers to build upon. You wouldn't accept that system. And yet, in many ways, this is how funders have setup social services to run.</DropCap>

              <P>The way we fund — and report on — social services is failing the people it was designed to serve. For the person in crisis — a job loss, a family breakdown, a health emergency — the system can feel like a maze rather than a source of support. They may need housing, income assistance, food security, and counselling all at once, but before they receive help, they often have to tell their story repeatedly to different workers across different programs, each interaction starting from zero.</P>

              <P>For frontline workers, the burden is quieter but just as significant. Their work is split between supporting people and documenting that support. The data they extract from clients feels oppressive, and rarely returns in a form that improves their decisions. It seems to only flow upward into reports.</P>

              <P>For funders, the experience is structured but incomplete. Reports arrive regularly — well-assembled, technically sound — but ultimately hollow. They demonstrate activity, reach, and effort, yet rarely provide a clear picture of how lives are empirically improving. Over time, they begin to sound the same, each one implicitly asking for continued funding without offering deeper insight into what is truly working.</P>

              <P>This has real consequences. It limits the ability to compare investments, to understand impact, and to allocate resources with confidence. The system produces activity at scale — but very little clarity.</P>

              <TimeChart />

              <P>This is a design problem. When data is organized around programs, fragmentation is inevitable. When fragmentation is inevitable, longitudinal insights are nearly impossible. And when insight is missing, decision-making defaults to relationships with funders, marketing, and inertia. It doesn't have to be this way.</P>

              <Quote>Reporting should give us <strong>real insight</strong> into what's happening – not just justify money spent.</Quote>

              <H2>A System Built for a Bygone Era</H2>

              <P>For most of the sector's history, everything was done on paper; intake forms, case files, manual tallies. Paper imposed hard limits. It made it easy to count activities but difficult to track outcomes. It was easy to document programs but nearly impossible to follow people across systems. Evaluation evolved around these constraints, emphasizing what could be counted rather than what desperately needed to be understood.</P>

              <P>When digital systems arrived, they did not fundamentally change this structure. Forms became electronic, filing cabinets became databases, and reporting became more complex, but the underlying model remained the same: program-centric, retrospective, and siloed.</P>

              <P>At the same time, funders — each operating with reasonable and distinct mandates — introduced their own unique reporting frameworks. Organizations adapted as they had to, building systems capable of satisfying multiple funders rather than systems capable of generating shared insight. The same work was translated into different formats again and again, without anyone gaining a complete picture.</P>

              <P>Over time, intake practices became more extractive, re-traumatizing people already at their nadir by making them retell stories about their worst moments again and again. Data was collected as a condition of access, and rarely benefited the person sharing it. Evaluation gave up on understanding change and focussed on justifying funding.</P>

              <H2>How can we make things dramatically better?</H2>

              <P>The <strong>problem is systemic and structural</strong>, but the <strong>solution is incremental and surmountable</strong>. The shift begins with a simple but profound change: organizing data around people, rather than programs. Today, information is collected within the boundaries of individual services, shaped by program requirements and funding conditions. This makes it possible to describe what may have happened within a program, but it makes it exceedingly difficult to understand what happens to people.</P>

              <P>A people-centered model changes this without discarding what already exists. Funders can still see what was delivered, how often, and at what scale. What changes is that this information is no longer isolated. It connects into a broader picture where individual journeys can be understood across services and over time.</P>

              <P>The difference is not subtle. In a program-centered system, it is nearly impossible to see how services interact. Correlation remains hidden, and each program appears to operate independently. In a people-centered system, those relationships become visible by default. It becomes possible to understand how different supports combine — how counselling interacts with employment training, how housing stability influences mental health, and how multiple interventions contribute to long-term outcomes.</P>

              <P>The conversation itself begins to shift. Instead of asking "Do you qualify?", the system asks "What are you trying to achieve, and how can we help?" This represents a deeper change in role — from acting as a gatekeeper who determines access, to acting as a guide who helps people navigate toward better outcomes.</P>

              <P>This is not a theoretical leap. The underlying infrastructure now exists: consent-based sharing, and real-time communication tools that make it possible to stay connected and learn over time leading to longitudinal insights.</P>

            <section style={{ padding: "64px 0" }}>
              <Chapter label="What Becomes Possible" id="sec-possible" />

              <H2>Not just better reports, better service</H2>

              <P>When this shift happens, it isn't just reporting that gets better — the system begins to behave differently. It becomes possible to see the bigger picture, to see how services interact rather than evaluating them in isolation. Longitudinal and real-time insight replaces static snapshots, allowing funders and organizations to follow trajectories over months and years. Engagement becomes proactive, with the ability to identify and reach people before challenges escalate into crises. Patterns begin to emerge across neighbourhoods, revealing where investments are working and where gaps persist.</P>

              <P>Perhaps most importantly, the experience becomes less extractive. People tell their story once, and that understanding follows them with consent. Data begins to serve clients, rather than being taken from them repeatedly. The difference is not just analytical, it means better service and less trauma for people in need.</P>

              <P>Today, if a police officer responds to a domestic incident and offers a referral to a support organization, what happens next is often invisible. The referral may or may not result in contact, and even when it does, the broader system remains unaware of the outcome.</P>

              <P>In a people-centered system, that starts with consent and connection, that same moment becomes the beginning of a coordinated response. A domestic violence organization receives the referral with context, mental health and housing providers can align their support around the same individual. Instead of fragmented interventions, the person experiences continuity.</P>

              <P>And over time, the system learns from that coordination — not just that services were delivered, but how they contributed to stability, safety, and recovery.</P>

              <P>This is not theoretical. Platforms like <strong>Flourishing Systems' Transform</strong> are already enabling this kind of shift — providing consent-based, people-centered data infrastructure that makes reporting useful for frontline workers, meaningful for funders, and respectful of the people it serves.</P>

            {/* ── THREE COMMITMENTS ── */}
            <section style={{ padding: "64px 0" }}>
              <Chapter label="What Funders Can Do" id="sec-commitments" />

              <H2>Three Commitments for Funders</H2>

              <P>Funders are uniquely positioned to lead this change — not by asking for more data, but by asking for data that works differently.</P>

              <Quote>If data doesn't create value for the person sharing it, or the worker asking for it, <strong>it won't create value for the funder receiving it.</strong></Quote>

              <P>Here are three commitments outcome-focused funders can make.</P>

              <Principle number={1} title="Mandate Data Mobility">
                People should be able to move their data between funded agencies. Giving individuals the ability to move their data between organizations allows their progress, context, and history to move with them — reducing friction and improving access. It also makes it possible to understand outcomes across services, not just within them.
              </Principle>

              <Principle number={2} title="Invest in Shared Infrastructure and Data Literacy">
                Support the systems, standards, and skills required to make data useful. This includes setting standards, and funding for interoperability, analytics capacity, and ethical governance. Without this investment, the shift from activity to achievement remains out of reach.
              </Principle>

              <Principle number={3} title="Prioritize Learning Over Compliance">
                Create space for honest reporting and iteration. Reward transparency about what isn't working, and treat evaluation as a tool for improvement rather than justification.
              </Principle>

              <P>Taken together, these shifts change what funders can see — and therefore how they decide. It becomes possible to observe whether people are actually receiving better support, to measure outcomes over time, and to understand how different investments interact.</P>

              <Quote>This is the difference between <strong>funding programs</strong> and <strong>managing a system.</strong></Quote>
            </section>

                  <h2 style={{ fontFamily: FONTS.serif, fontSize: 32, fontWeight: 700, color: B.background, lineHeight: 1.25, margin: "0 0 24px", maxWidth: 600 }}>
                    Data Mobility Is a Policy Question, Not Just a Technical One
                  </h2>
                  <p style={{ fontFamily: FONTS.serif, fontSize: 18, lineHeight: 1.75, color: B.background, opacity: 0.75, margin: "0 0 40px", maxWidth: 640 }}>

                  </p>

            {/* ── STARTING THE SHIFT ── */}
            <section style={{ padding: "64px 0" }}>
              <Chapter label="Starting the Shift" id="sec-shift" />

              <H2>Into the Light</H2>

              <P>It is easy to assume that meaningful change requires alignment across the entire system. In practice, it often begins much smaller.</P>

              <P>When a single funder starts asking different questions — prioritizing outcomes over activity, connection over isolation, and learning over compliance — the sector responds. They begin to build systems that can answer those questions. They collect data that is useful not just for reporting, but for practice.</P>

              <P>And once that data exists, its value becomes visible. Others begin to follow.</P>

              <P>Progress does not require consensus. It requires leadership.</P>

              <Quote>The question is not whether a better system is possible. <strong>It is whether we are willing to ask for it.</strong></Quote>
            </section>
